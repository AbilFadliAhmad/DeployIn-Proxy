<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gateway Tutorial - Dukung Deployin!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // --- UBAH DUA LINK INI SESUAI MILIK ANDA ---
      const SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/1l2CG74y-5zhdAbOMXeiHlb1M3hhz3OvBbElzTwW-_oI/edit?usp=sharing";
      const GITHUB_REPO_URL = "https://github.com/AbilFadliAhmad/DeployIn.git";

      // Cek LocalStorage: Jika sudah pernah memberi bintang, langsung redirect tanpa ampun!
    //   if (localStorage.getItem("hasStarred") === "true") {
    //     window.location.href = SPREADSHEET_URL;
    //   }
    </script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen p-4 font-sans text-gray-800">
    <div class="bg-white max-w-2xl w-full rounded-2xl shadow-xl overflow-hidden text-center p-8 border border-gray-200">
      <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Tunggu Sebentar! 🛑</h1>
      <p class="text-gray-600 mb-6 text-sm md:text-base">
        Sebelum lanjut ke tutorial Spreadsheet, yuk dukung pengembangan aplikasi <strong>Deployin</strong> dengan memberikan <em>Star</em> di GitHub kami. Tonton video singkat di bawah ini caranya!
      </p>

      <div class="relative w-full rounded-lg overflow-hidden shadow-sm bg-black mb-6 aspect-video flex items-center justify-center">
        <video id="tutorialVideo" controls class="w-full h-full object-contain">
          <source src="./Github-Video.mp4" type="video/mp4" />
          Browser Anda tidak mendukung tag video.
        </video>
      </div>

      <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mt-8">
        <button id="btnGithub" onclick="bukaGithub()" class="flex items-center justify-center w-full sm:w-auto px-6 py-3 bg-gray-900 hover:bg-gray-800 text-white font-bold rounded-lg transition-colors shadow-md">
          <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill-rule="evenodd"
              d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
              clip-rule="evenodd"
            ></path>
          </svg>
          1. Beri Bintang di GitHub
        </button>

        <button id="btnLanjut" onclick="lanjutKeTutorial()" class="hidden w-full sm:w-auto px-6 py-3 bg-green-600 hover:bg-green-500 text-white font-bold rounded-lg transition-colors shadow-md">2. Lanjut ke Tutorial ➔</button>
      </div>
      <p id="pesanBantuan" class="text-xs text-gray-500 mt-4 opacity-0 transition-opacity duration-500">Terima kasih! Silakan klik tombol hijau untuk menuju ke Spreadsheet.</p>
    </div>

    <script>
      function bukaGithub() {
        localStorage.setItem("hasStarred", "true");
        window.open(GITHUB_REPO_URL, "_blank");

        document.getElementById("btnLanjut").classList.remove("hidden");
        document.getElementById("pesanBantuan").classList.remove("opacity-0");

        const btnGit = document.getElementById("btnGithub");
        btnGit.classList.remove("bg-gray-900", "hover:bg-gray-800");
        btnGit.classList.add("bg-gray-400", "cursor-default");
        btnGit.innerText = "✓ Membuka GitHub...";
      }

      function lanjutKeTutorial() {
        window.location.href = SPREADSHEET_URL;
      }
    </script>
  </body>
</html>
